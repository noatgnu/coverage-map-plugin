plugin:
  id: coverage-map
  name: Protein Coverage Map
  version: 1.0.0
  description: Generate protein coverage maps from peptide data with intensity values
  author: "CauldronGO Team"
  category: utilities
  icon: map
  repository: https://github.com/noatgnu/coverage-map-plugin

runtime:
  environments:
    - python
  entrypoint: get_coverage.py

inputs:
  - name: input_file
    label: Input File
    type: file
    required: true
    description: Tab-separated or CSV file containing peptide data with intensity values
    file_types:
      - .txt
      - .tsv
      - .csv

  - name: sequence_column
    label: Peptide Sequence Column
    type: column-selector
    required: true
    description: Column containing peptide sequences
    sourceFile: input_file

  - name: index_column
    label: Index Column
    type: column-selector
    required: true
    description: Column to use as peptide identifier/index
    sourceFile: input_file

  - name: uniprot_acc_column
    label: UniProt Accession Column
    type: column-selector
    required: true
    description: Column containing UniProt accession IDs
    sourceFile: input_file

  - name: value_columns
    label: Intensity/Value Columns
    type: column-selector
    multiple: true
    required: true
    description: Columns containing intensity or abundance values
    sourceFile: input_file

  - name: fasta_file
    label: FASTA File (Optional)
    type: file
    required: false
    description: Optional FASTA file with protein sequences. If not provided, sequences will be fetched from UniProt.
    file_types:
      - .fasta
      - .fa

execution:
  argsMapping:
    input_file: "--input"
    sequence_column: "--sequence-col"
    index_column: "--index-col"
    uniprot_acc_column: "--uniprot-col"
    value_columns: "--value-cols"
    fasta_file: "--fasta"
  outputDir: "--output-dir"
  requirements:
    python: ">=3.10"
    pythonRequirementsFile: requirements.txt

outputs:
  - name: coverage.txt
    path: coverage.txt
    type: data
    format: tsv
    description: Tab-separated file with coverage map data
  - name: uniprot_data.txt
    path: uniprot_data.txt
    type: data
    format: tsv
    description: UniProt sequence data used for mapping
